name: Sync Issue State with Done Column

on:
  project_card:
    types: [moved]

jobs:
  sync-issue-state:
    runs-on: ubuntu-latest
    steps:
      - name: Update issue state based on column
        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const columnName = context.payload.project_card.column_name.toLowerCase();
            const issueNumber = context.payload.project_card.content_url
              .split('/').pop();

            // Get current issue state
            const { data: issue } = await github.rest.issues.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber
            });

            if (columnName === 'done' && issue.state !== 'closed') {
              // Move to Done → Close issue
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                state: 'closed'
              });
              console.log(`Closed issue #${issueNumber}`);
            } else if (columnName !== 'done' && issue.state === 'closed') {
              // Move out of Done → Reopen issue
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                state: 'open'
              });
              console.log(`Reopened issue #${issueNumber}`);
            }
